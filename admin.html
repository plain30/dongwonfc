<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>관리자 | 동원FC 회비관리 시스템 v9.1</title>
<link rel="stylesheet" href="./css/style.css">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script defer src="./js/defaultData.js"></script>
<script defer src="./js/core.js"></script>
<script defer src="./js/admin.js"></script>
</head>
<body>
<div id="app" class="app">
  <aside class="sidebar">
    <div class="brand"><img src="./assets/logo.jpg" alt="logo"><div><b>동원FC</b><span>관리자 v9.1</span></div></div>
    <button data-view="dashboard" class="nav active">대시보드</button>
    <button data-view="members" class="nav">회원관리</button>
    <button data-view="fees" class="nav">회비현황</button>
    <button data-view="special" class="nav">특별회비</button>
    <button data-view="upload" class="nav">파일 업로드</button>
    <button data-view="settings" class="nav">환경설정</button>
    <button data-view="backup" class="nav">백업/복원</button>
    <button id="logoutBtn" class="nav danger">로그아웃</button>
  </aside>
  <main class="main">
    <header class="topbar">
      <div><h1 id="pageTitle">관리자 대시보드</h1><p id="pageSub">관리자 전용 화면입니다. 회원번호 000은 자동 제외됩니다.</p></div>
      <div class="userbox" id="userBox">관리자 한재식</div>
    </header>
    <section id="content"></section>
  </main>
</div>
</body>
</html>
