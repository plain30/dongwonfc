<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>동원FC 회비관리 V13</title>
  <link rel="stylesheet" href="./css/style.css?v=13.1.0">
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="./js/defaultData.js?v=13.1.0"></script>
</head>
<body class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <img src="./assets/logo.jpg" alt="동원FC 로고">
      <div><strong>동원FC</strong><small>회비관리 V13</small></div>
    </div>
    <nav class="nav-list">
      <button class="nav active" data-view="dashboard">대시보드</button>
      <button class="nav" data-view="members">회원관리</button>
      <button class="nav" data-view="fees">회비현황</button>
      <button class="nav" data-view="special">특별회비</button>
      <button class="nav" data-view="upload">파일 업로드</button>
      <button class="nav" data-view="settings">환경설정</button>
      <button class="nav" data-view="audit">변경 이력</button>
    </nav>
    <div class="sidebar-footer">Google Sheets 공동 데이터</div>
  </aside>

  <div class="workspace">
    <header class="topbar">
      <div class="topbar-left">
        <button class="mobile-menu" id="menuBtn" aria-label="메뉴 열기">☰</button>
        <div><h1 id="pageTitle">관리자 대시보드</h1><p id="pageSubtitle">동원FC 2026 회비납부현황 시스템</p></div>
      </div>
      <div class="top-actions">
        <span id="syncStatus" class="cloud-status loading"><i></i><span>연결 확인 중</span></span>
        <button id="refreshTopBtn" class="btn">새로고침</button>
        <button id="logoutBtn" class="btn dark">로그아웃</button>
      </div>
    </header>
    <main class="main-content">
      <div id="globalMessage"></div>
      <section id="content" aria-live="polite"></section>
    </main>
  </div>
  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
  <script type="module" src="./js/admin.js?v=13.1.0"></script>
</body>
</html>
