<style>

  html, body { margin: 0; padding: 0; height: 100%; font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; }
  body { display: flex; flex-direction: column; background: #f5f6f8; color: #222; }

  header h1 { margin: 0 0 4px 0; font-size: 17px; font-weight: 600; }
  header .sub { font-size: 12px; opacity: .85; }

  .book-row { display: flex; gap: 6px; align-items: center; margin-bottom: 6px; width: 100%; }
  .book-label, .chapter-label { font-size: 11px; opacity: .85; margin-right: 4px; font-weight: 600; }
  .book-btn { padding: 7px 16px; background: rgba(255,255,255,.1); color: white; border: 2px solid rgba(255,255,255,.35); border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 700; }
  .book-btn.active { background: #f7c948; color: #1a3a6c; border-color: #f7c948; }
  .tab-btn { padding: 6px 12px; background: rgba(255,255,255,.15); color: white; border: 1px solid rgba(255,255,255,.3); border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; }
  .tab-btn.active { background: white; color: #1a3a6c; }
  .tab-btn.hidden { display: none; }
  .search-bar { flex: 1; min-width: 220px; display: flex; gap: 8px; align-items: center; margin-left: auto; }
  .search-bar input { flex: 1; padding: 8px 12px; border: none; border-radius: 6px; font-size: 14px; outline: none; }
  .search-bar .count { background: rgba(255,255,255,.2); padding: 6px 10px; border-radius: 6px; font-size: 12px; white-space: nowrap; }
  main { display: flex; flex: 1; min-height: 0; }
  #sidebar { width: 380px; flex-shrink: 0; background: white; border-right: 1px solid #d8dce3; overflow-y: auto; padding: 0; }
  .chapter-divider { background: #1a3a6c; color: white; padding: 8px 14px; font-size: 13px; font-weight: 700; position: sticky; top: 0; z-index: 5; }
  .chapter-divider.telecom { background: #6b21a8; }
  #sidebar .item { padding: 10px 14px; border-bottom: 1px solid #eef0f3; cursor: pointer; display: flex; gap: 8px; align-items: flex-start; transition: background .12s; }
  #sidebar .item:hover { background: #eef5ff; }
  #sidebar .item.active { background: #d6e8ff; border-left: 4px solid #2563aa; padding-left: 10px; }
  #sidebar .item.sub { padding-left: 32px; background: #fafbfc; }
  #sidebar .item.sub:hover { background: #eef5ff; }
  #sidebar .item.sub.active { background: #d6e8ff; padding-left: 28px; }
  #sidebar .id { flex-shrink: 0; font-weight: 700; color: #1a3a6c; font-size: 13px; min-width: 64px; }
  #sidebar .item.telecom .id { color: #6b21a8; }
  #sidebar .item.sub .id { color: #2563aa; min-width: 72px; }
  #sidebar .item.sub.telecom .id { color: #8b4cc8; }
  #sidebar .title { font-size: 13px; flex: 1; line-height: 1.4; }
  #sidebar .page { font-size: 11px; color: #8893a4; flex-shrink: 0; }
  #sidebar .item.hidden, .chapter-divider.hidden { display: none; }
  #viewer { flex: 1; overflow-y: auto; background: #4a4f57; padding: 20px; min-width: 0; padding-right: 200px; }
  #viewer .placeholder { color: #cdd2db; text-align: center; margin-top: 60px; font-size: 16px; }
  #viewer .page-block { margin-bottom: 14px; text-align: center; }
  #viewer .page-label { color: #fff; font-size: 11px; margin-bottom: 4px; text-align: center; background: rgba(0,0,0,.25); display: inline-block; padding: 2px 8px; border-radius: 4px; }
  #viewer .page-wrapper { position: relative; display: inline-block; max-width: 64%; box-shadow: 0 4px 16px rgba(0,0,0,.4); border-radius: 4px; overflow: hidden; background: white; line-height: 0; transition: box-shadow .2s; }
  #viewer .page-wrapper.active-anno { box-shadow: 0 0 0 3px #f7c948, 0 4px 16px rgba(0,0,0,.4); }
  #viewer .page-wrapper img { display: block; width: 100%; height: auto; }
  #viewer .page-wrapper canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; touch-action: none; cursor: crosshair; }
  /* Tool-specific cursors */
  body[data-tool="pen"] #viewer .page-wrapper canvas { cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='18' height='18' viewBox='0 0 18 18'><circle cx='9' cy='9' r='2.5' fill='%23222'/><circle cx='9' cy='9' r='3.5' fill='none' stroke='%23fff' stroke-width='1'/></svg>") 9 9, crosshair; }
  body[data-tool="highlighter"] #viewer .page-wrapper canvas { cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24'><rect x='4' y='4' width='16' height='16' fill='%23fff066' stroke='%23222' stroke-width='1'/><rect x='4' y='4' width='16' height='4' fill='%23222'/></svg>") 12 12, crosshair; }
  body[data-tool="eraser"] #viewer .page-wrapper canvas { cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='28' height='28' viewBox='0 0 28 28'><rect x='3' y='9' width='22' height='12' fill='%23ffc8d3' stroke='%23222' stroke-width='1' rx='2'/><rect x='17' y='9' width='8' height='12' fill='%23f59ab1' stroke='%23222' stroke-width='1' rx='2'/></svg>") 14 14, crosshair; }
  #viewer .section-header { background: #fff; color: #1a3a6c; padding: 12px 16px; border-radius: 6px; margin-bottom: 14px; font-size: 15px; font-weight: 600; box-shadow: 0 2px 8px rgba(0,0,0,.15); max-width: 64%; margin-left: auto; margin-right: auto; }
  #viewer .section-header .sec-id { color: #2563aa; margin-right: 10px; }
  #viewer .section-header.telecom .sec-id { color: #6b21a8; }
  .no-results { padding: 30px 20px; text-align: center; color: #8893a4; font-size: 13px; }
  /* Floating annotation toolbar */
  .float-toolbar { position: fixed; top: 50%; right: 14px; transform: translateY(-50%); background: rgba(255,255,255,.97); padding: 12px 10px; border-radius: 10px; box-shadow: 0 6px 24px rgba(0,0,0,.35); display: flex; flex-direction: column; gap: 8px; z-index: 9999; width: 170px; font-size: 12px; border: 1px solid rgba(0,0,0,.08); }
  .float-toolbar .ft-collapse { background: #f0f4ff; border: 1px solid #c4d4ed; cursor: pointer; font-size: 13px; color: #2563aa; padding: 3px 8px; width: auto; align-self: flex-end; border-radius: 5px; line-height: 1.2; margin-bottom: -2px; }
  .float-toolbar .ft-collapse:hover { background: #d6e8ff; }
  .float-toolbar .ft-header { font-weight: 700; color: #1a3a6c; text-align: center; font-size: 13px; margin-bottom: 2px; border-bottom: 1px solid #eee; padding-bottom: 6px; }
  .float-toolbar.collapsed { width: auto; padding: 6px 8px; flex-direction: row; align-items: center; gap: 8px; }
  .float-toolbar.collapsed > *:not(.ft-collapse):not(.ft-header) { display: none; }
  .float-toolbar.collapsed .ft-header { border: none; margin: 0; padding: 0; }
  .float-toolbar .lbl { color: #555; font-weight: 700; font-size: 11px; text-align: center; }
  .float-toolbar .swatch-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; justify-items: center; }
  .float-toolbar .swatch { width: 26px; height: 26px; border-radius: 50%; cursor: pointer; border: 2px solid #fff; box-shadow: 0 0 0 1px #aaa; transition: transform .1s; }
  .float-toolbar .swatch:hover { transform: scale(1.1); }
  .float-toolbar .swatch.active { box-shadow: 0 0 0 3px #2563aa; transform: scale(1.18); }
  .float-toolbar select, .float-toolbar button.tool { font-size: 12px; padding: 5px 8px; border: 1px solid #ccc; border-radius: 5px; cursor: pointer; background: #fff; font-family: inherit; width: 100%; }
  .float-toolbar button.tool:hover { background: #f0f4ff; }
  .float-toolbar .tool.active { background: #d6e8ff; border-color: #2563aa; font-weight: 700; }
  .float-toolbar .opacity-wrap { display: flex; align-items: center; gap: 6px; }
  .float-toolbar input[type="range"] { flex: 1; width: auto; margin: 0; }
  .float-toolbar .op-val { font-weight: 700; color: #1a3a6c; }
  .float-toolbar hr { border: none; border-top: 1px solid #e0e0e0; margin: 2px 0; }
  .float-toolbar .hint { font-size: 10px; color: #555; text-align: left; line-height: 1.4; padding: 5px 6px; background: #f7f9fc; border-radius: 4px; }
  .float-toolbar .hint b { color: #1a3a6c; }

  .page-actions { position: absolute; top: 8px; right: 8px; display: flex; gap: 4px; z-index: 20; line-height: normal; }
  .page-actions button { background: rgba(255,255,255,.95); border: 1px solid #aaa; border-radius: 5px; padding: 5px 10px; font-size: 12px; cursor: pointer; font-family: inherit; box-shadow: 0 1px 4px rgba(0,0,0,.2); }

  .page-actions .dl-btn { background: #2563aa; color: white; border-color: #2563aa; font-weight: 700; }

  #sidebar::-webkit-scrollbar-thumb { background: #bcc3d0; border-radius: 5px; }
  #viewer::-webkit-scrollbar-thumb { background: #6b7180; border-radius: 5px; }

const CHAPTER_NAMES = {
  'electric-4': '【전기】제4장 배전설비공사',
  'electric-5': '【전기】제5장 내선설비공사',
  'electric-10': '【전기】제10장 소방전기설비공사',
  'telecom-4': '【통신】제4장 통신케이블공사',
  'telecom-5': '【통신】제5장 교환설비공사'
};

const PAGE_DIRS = { 'electric': 'pages', 'telecom': 'telecom_pages' };

const sidebar = document.getElementById('sidebar');
const viewer = document.getElementById('viewer');
const searchInput = document.getElementById('searchInput');
const totalCount = document.getElementById('totalCount');
const ecCount = document.getElementById('ecCount');
const tcCount = document.getElementById('tcCount');
const visibleCount = document.getElementById('visibleCount');

totalCount.textContent = SECTIONS.length;
ecCount.textContent = SECTIONS.filter(s => s.book === 'electric').length;
tcCount.textContent = SECTIONS.filter(s => s.book === 'telecom').length;

let activeBook = 'all';
let activeChapter = 'all';

// Active annotation reference for keyboard shortcuts
let activeAnno = null;

// Global drawing state
const drawState = {
  color: '#ffd400',
  size: 6,
  opacity: 0.5,
  tool: 'highlighter'
};

const OPACITY_SCALE = 0.5;

function setActiveAnno(anno) {
  if (activeAnno && activeAnno.wrapper) activeAnno.wrapper.classList.remove('active-anno');
  activeAnno = anno;
  if (activeAnno && activeAnno.wrapper) activeAnno.wrapper.classList.add('active-anno');
}

function buildSidebar() {
  sidebar.innerHTML = '';
  let lastKey = null;
  SECTIONS.forEach((s, idx) => {
    const key = s.book + '-' + s.chapter;
    if (key !== lastKey) {
      const d = document.createElement('div');
      d.className = 'chapter-divider' + (s.book === 'telecom' ? ' telecom' : '');
      d.dataset.book = s.book;
      d.dataset.chapter = s.chapter;
      d.textContent = CHAPTER_NAMES[key] || ('제' + s.chapter + '장');
      sidebar.appendChild(d);
      lastKey = key;
    }
    const div = document.createElement('div');
    div.className = 'item' + (s.minor ? ' sub' : '') + (s.book === 'telecom' ? ' telecom' : '');
    div.dataset.idx = idx;
    div.dataset.book = s.book;
    div.dataset.chapter = s.chapter;
    div.dataset.search = (s.section + ' ' + s.title).toLowerCase();
    div.innerHTML = '<span class="id">' + s.section + '</span><span class="title">' + s.title + '</span><span class="page">p.' + s.page + '</span>';
    div.addEventListener('click', () => showSection(idx));
    sidebar.appendChild(div);
  });
  applyFilter();
}

function updateChapterTabs() {
  document.querySelectorAll('.tab-btn').forEach(btn => {
    const bookAttr = btn.dataset.book;
    if (!bookAttr || activeBook === 'all' || bookAttr === activeBook) btn.classList.remove('hidden');
    else btn.classList.add('hidden');
  });
  const activeTabEl = document.querySelector('.tab-btn.active');
  if (activeTabEl && activeTabEl.classList.contains('hidden')) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('.tab-btn[data-chapter="all"]').classList.add('active');
    activeChapter = 'all';
  }
}

function applyFilter() {
  const q = searchInput.value.trim().toLowerCase();
  let any = false;
  sidebar.querySelectorAll('.chapter-divider').forEach(d => {
    const bookMatch = (activeBook === 'all' || d.dataset.book === activeBook);
    const chapterMatch = (activeChapter === 'all' || d.dataset.chapter === activeChapter);
    if (bookMatch && chapterMatch) d.classList.remove('hidden');
    else d.classList.add('hidden');
  });
  sidebar.querySelectorAll('.item').forEach(el => {
    const bookMatch = (activeBook === 'all' || el.dataset.book === activeBook);
    const chapterMatch = (activeChapter === 'all' || el.dataset.chapter === activeChapter);
    const queryMatch = (!q || el.dataset.search.includes(q));
    if (bookMatch && chapterMatch && queryMatch) { el.classList.remove('hidden'); any = true; }
    else el.classList.add('hidden');
  });
  visibleCount.textContent = sidebar.querySelectorAll('.item:not(.hidden)').length + '개 표시';
  const noRes = sidebar.querySelector('.no-results');
  if (noRes) noRes.remove();
  if (!any) {
    const div = document.createElement('div');
    div.className = 'no-results';
    div.textContent = '검색 결과가 없습니다.';
    sidebar.appendChild(div);
  }
}

function showSection(idx) {
  setActiveAnno(null); // reset on navigation
  sidebar.querySelectorAll('.item').forEach(el => el.classList.remove('active'));
  const activeEl = sidebar.querySelector('.item[data-idx="' + idx + '"]');
  if (activeEl) {
    activeEl.classList.add('active');
    activeEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
  const s = SECTIONS[idx];
  viewer.innerHTML = '';
  const header = document.createElement('div');
  header.className = 'section-header' + (s.book === 'telecom' ? ' telecom' : '');
  const bookLabel = s.book === 'telecom' ? '통신' : '전기';
  const chapterLabel = '제' + s.chapter + '장';
  header.innerHTML = '<span class="sec-id">[' + bookLabel + '·' + chapterLabel + '] ' + s.section + '</span>' + s.title + ' <span style="float:right;font-weight:400;font-size:12px;color:#666">p.' + s.page + (s.end_page > s.page ? ' ~ ' + s.end_page : '') + '</span>';
  viewer.appendChild(header);
  const dir = PAGE_DIRS[s.book] || 'pages';
  for (let p = s.page; p <= s.end_page; p++) {
    viewer.appendChild(createPageBlock(p, dir, s));
  }
  viewer.scrollTop = 0;
}

function createPageBlock(p, dir, s) {
  const block = document.createElement('div');
  block.className = 'page-block';

  const label = document.createElement('div');
  label.className = 'page-label';
  label.textContent = 'PDF Page ' + p;
  block.appendChild(label);
  block.appendChild(document.createElement('br'));

  const wrapper = document.createElement('div');
  wrapper.className = 'page-wrapper';

  const img = document.createElement('img');
  img.src = dir + '/p-' + p + '.jpg';
  img.alt = 'page ' + p;
  img.loading = 'lazy';

  const canvas = document.createElement('canvas');
  wrapper.appendChild(img);
  wrapper.appendChild(canvas);

  const actions = document.createElement('div');
  actions.className = 'page-actions';
  actions.innerHTML = '<button class="undo" title="실행취소 (Ctrl+Z)">↶</button><button class="clear" title="전체지우기 (Del)">🗑️</button><button class="dl-btn" title="이미지 다운로드">💾</button>';
  wrapper.appendChild(actions);

  block.appendChild(wrapper);

  const setup = () => setupAnnotation(img, canvas, actions, wrapper, p, s);
  if (img.complete && img.naturalWidth > 0) setup();
  else img.addEventListener('load', setup);

  return block;
}

function setupAnnotation(img, canvas, actions, wrapper, pageNum, sec) {
  canvas.width = img.naturalWidth;
  canvas.height = img.naturalHeight;
  const ctx = canvas.getContext('2d');

  const local = {
    drawing: false, history: [],
    lastX: 0, lastY: 0,
    shiftMode: false,
    shiftAnchorX: 0, shiftAnchorY: 0,
    preShiftSnapshot: null
  };

  function getCoords(clientX, clientY) {
    const rect = canvas.getBoundingClientRect();
    const sx = canvas.width / rect.width;
    const sy = canvas.height / rect.height;
    return { x: (clientX - rect.left) * sx, y: (clientY - rect.top) * sy };
  }

  function saveState() {
    try {
      local.history.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
      if (local.history.length > 50) local.history.shift();
    } catch (e) {}
  }

  function captureSnapshot() {
    try { return ctx.getImageData(0, 0, canvas.width, canvas.height); }
    catch(e) { return null; }
  }

  function applyStyle() {
    if (drawState.tool === 'eraser') {
      ctx.globalCompositeOperation = 'destination-out';
      ctx.globalAlpha = 1;
      ctx.strokeStyle = '#000';
      ctx.lineWidth = drawState.size * 3;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
    } else if (drawState.tool === 'highlighter') {
      // Highlighter: square/chisel tip
      ctx.globalCompositeOperation = 'source-over';
      ctx.globalAlpha = drawState.opacity * OPACITY_SCALE;
      ctx.strokeStyle = drawState.color;
      ctx.lineWidth = drawState.size * 3;
      ctx.lineCap = 'butt';
      ctx.lineJoin = 'miter';
      ctx.miterLimit = 2;
    } else {
      // Pen: round tip
      ctx.globalCompositeOperation = 'source-over';
      ctx.globalAlpha = drawState.opacity * OPACITY_SCALE;
      ctx.strokeStyle = drawState.color;
      ctx.lineWidth = drawState.size;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
    }
  }

  function doUndo() {
    if (local.history.length > 0) {
      const prev = local.history.pop();
      ctx.putImageData(prev, 0, 0);
    }
  }
  function doClear(withConfirm) {
    if (withConfirm && !confirm('이 페이지의 모든 표시를 지우시겠습니까?')) return;
    saveState();
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  }

  function startDraw(cx, cy, isShift) {
    local.drawing = true;
    saveState();
    const { x, y } = getCoords(cx, cy);
    local.lastX = x; local.lastY = y;
    local.shiftMode = false;
    local.preShiftSnapshot = null;
    applyStyle();
    ctx.beginPath();
    if (drawState.tool === 'highlighter') {
      // Draw initial dot as a small rectangle (chisel tip)
      const half = ctx.lineWidth / 2;
      ctx.fillStyle = drawState.color;
      const prevAlpha = ctx.globalAlpha;
      ctx.fillRect(x - half, y - half, ctx.lineWidth, ctx.lineWidth);
      ctx.globalAlpha = prevAlpha;
      ctx.beginPath();
      ctx.moveTo(x, y);
    } else {
      ctx.moveTo(x, y);
      ctx.lineTo(x + 0.01, y + 0.01);
      ctx.stroke();
    }
    if (isShift) {
      local.shiftMode = true;
      local.shiftAnchorX = x;
      local.shiftAnchorY = y;
      local.preShiftSnapshot = captureSnapshot();
    }
  }

  function moveDraw(cx, cy, isShift) {
    if (!local.drawing) return;
    const { x, y } = getCoords(cx, cy);

    if (isShift && !local.shiftMode) {
      local.shiftMode = true;
      local.shiftAnchorX = local.lastX;
      local.shiftAnchorY = local.lastY;
      local.preShiftSnapshot = captureSnapshot();
    } else if (!isShift && local.shiftMode) {
      local.shiftMode = false;
      local.preShiftSnapshot = null;
      applyStyle();
      ctx.beginPath();
      ctx.moveTo(local.lastX, local.lastY);
    }

    if (local.shiftMode) {
      if (local.preShiftSnapshot) ctx.putImageData(local.preShiftSnapshot, 0, 0);
      const dx = x - local.shiftAnchorX;
      const dy = y - local.shiftAnchorY;
      let endX = x, endY = y;
      if (Math.abs(dx) >= Math.abs(dy)) endY = local.shiftAnchorY;
      else endX = local.shiftAnchorX;
      applyStyle();
      ctx.beginPath();
      ctx.moveTo(local.shiftAnchorX, local.shiftAnchorY);
      ctx.lineTo(endX, endY);
      ctx.stroke();
      local.lastX = endX;
      local.lastY = endY;
    } else {
      ctx.lineTo(x, y);
      ctx.stroke();
      local.lastX = x;
      local.lastY = y;
    }
  }

  function endDraw() {
    local.drawing = false;
    local.shiftMode = false;
    local.preShiftSnapshot = null;
  }

  function activate() {
    setActiveAnno({ doUndo, doClear, wrapper });
  }

  // Auto-activate first canvas so keyboard shortcuts work without clicking
  if (!activeAnno) activate();
  // Also activate on hover - whatever page user looks at becomes active
  canvas.addEventListener('mouseenter', activate);

  canvas.addEventListener('mousedown', (e) => { e.preventDefault(); activate(); startDraw(e.clientX, e.clientY, e.shiftKey); });
  canvas.addEventListener('mousemove', (e) => moveDraw(e.clientX, e.clientY, e.shiftKey));
  canvas.addEventListener('mouseup', endDraw);
  canvas.addEventListener('mouseleave', endDraw);
  canvas.addEventListener('touchstart', (e) => { e.preventDefault(); activate(); const t = e.touches[0]; startDraw(t.clientX, t.clientY, false); });
  canvas.addEventListener('touchmove', (e) => { e.preventDefault(); const t = e.touches[0]; moveDraw(t.clientX, t.clientY, false); });
  canvas.addEventListener('touchend', endDraw);

  actions.querySelector('.undo').addEventListener('click', () => { activate(); doUndo(); });
  actions.querySelector('.clear').addEventListener('click', () => { activate(); doClear(true); });
  actions.querySelector('.dl-btn').addEventListener('click', async () => {
    activate();
    const btn = actions.querySelector('.dl-btn');
    const origText = btn.textContent;
    btn.textContent = '⏳';
    btn.disabled = true;
    try {
      const bookTag = sec.book === 'telecom' ? '통신' : '전기';
      const fileName = bookTag + '_' + sec.section + '_p' + pageNum + '.png';

      // Try multiple methods to load image without tainting the canvas
      const cleanImg = await tryLoadCleanImage(img.src);

      const out = document.createElement('canvas');
      out.width = (cleanImg && cleanImg.naturalWidth) || img.naturalWidth;
      out.height = (cleanImg && cleanImg.naturalHeight) || img.naturalHeight;
      const octx = out.getContext('2d');

      let downloadable = null;
      let mode = '';

      if (cleanImg) {
        // We have a clean copy of the image - composite and download
        octx.drawImage(cleanImg, 0, 0);
        octx.drawImage(canvas, 0, 0);
        try {
          downloadable = await canvasToBlob(out);
          mode = 'full';
        } catch (e) { console.warn('toBlob with clean image failed:', e); }
      }

      if (!downloadable) {
        // Try direct (tainted) anyway - some browsers may allow it
        try {
          const out2 = document.createElement('canvas');
          out2.width = img.naturalWidth;
          out2.height = img.naturalHeight;
          const ctx2 = out2.getContext('2d');
          ctx2.drawImage(img, 0, 0);
          ctx2.drawImage(canvas, 0, 0);
          downloadable = await canvasToBlob(out2);
          mode = 'full';
        } catch (e) { console.warn('direct composite failed:', e); }
      }

      if (!downloadable) {
        // Last resort: download annotations only (clean canvas) or open both
        const choice = confirm(
          '브라우저 보안 정책으로 인해 원본 페이지와 합성한 이미지를 만들 수 없습니다.\n\n' +
          '확인을 누르면: 색칠한 부분만 투명 PNG로 다운로드합니다.\n' +
          '취소를 누르면: 다운로드를 중단합니다.\n\n' +
          '완전한 합성본이 필요하면 Win+Shift+S로 화면을 캡처하거나, ' +
          '로컬 웹서버를 통해 HTML을 열어주세요.'
        );
        if (choice) {
          downloadable = await canvasToBlob(canvas);
          mode = 'annotations';
        } else {
          return;
        }
      }

      const url = URL.createObjectURL(downloadable);
      const dlName = mode === 'annotations'
        ? (bookTag + '_' + sec.section + '_p' + pageNum + '_색칠만.png')
        : fileName;
      const a = document.createElement('a');
      a.href = url;
      a.download = dlName;
      a.target = '_blank';
      a.rel = 'noopener';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 2000);
    } catch (e) {
      console.error(e);
      alert('이미지 다운로드 중 오류가 발생했습니다.\n오류: ' + e.message);
    } finally {
      btn.textContent = origText;
      btn.disabled = false;
    }
  });
}


// ===== Helper functions for download (cross-browser, file:// compatible) =====
function imageFromBlob(blob) {
  return new Promise((res, rej) => {
    const url = URL.createObjectURL(blob);
    const im = new Image();
    im.onload = () => { res(im); setTimeout(() => URL.revokeObjectURL(url), 5000); };
    im.onerror = (e) => { URL.revokeObjectURL(url); rej(e); };
    im.src = url;
  });
}
function imageFromSrc(src) {
  return new Promise((res, rej) => {
    const im = new Image();
    im.onload = () => res(im);
    im.onerror = rej;
    im.src = src;
  });
}
function arrayBufferToBase64(buf) {
  const bytes = new Uint8Array(buf);
  let binary = '';
  const chunkSize = 0x8000;
  for (let i = 0; i < bytes.length; i += chunkSize) {
    binary += String.fromCharCode.apply(null, bytes.subarray(i, i + chunkSize));
  }
  return btoa(binary);
}
function xhrArrayBuffer(url) {
  return new Promise((res, rej) => {
    const xhr = new XMLHttpRequest();
    xhr.open('GET', url, true);
    xhr.responseType = 'arraybuffer';
    xhr.onload = () => {
      if ((xhr.status === 200 || xhr.status === 0) && xhr.response) res(xhr.response);
      else rej(new Error('XHR status: ' + xhr.status));
    };
    xhr.onerror = () => rej(new Error('XHR network error'));
    xhr.send();
  });
}
function canvasToBlob(c) {
  return new Promise((resolve, reject) => {
    try {
      c.toBlob((b) => b ? resolve(b) : reject(new Error('toBlob returned null')), 'image/png');
    } catch (e) { reject(e); }
  });
}
async function tryLoadCleanImage(src) {
  // Method 1: fetch -> blob -> Image
  try {
    const resp = await fetch(src);
    if (resp.ok || resp.status === 0) {
      const blob = await resp.blob();
      if (blob.size > 0) return await imageFromBlob(blob);
    }
  } catch (e) { console.debug('fetch failed:', e.message); }

  // Method 2: XHR -> arraybuffer -> base64 data URL -> Image (same-origin via data:)
  try {
    const buf = await xhrArrayBuffer(src);
    const b64 = arrayBufferToBase64(buf);
    return await imageFromSrc('data:image/jpeg;base64,' + b64);
  } catch (e) { console.debug('XHR failed:', e.message); }

  // Method 3: Image with crossOrigin (works only if server sends CORS)
  try {
    return await new Promise((res, rej) => {
      const im = new Image();
      im.crossOrigin = 'anonymous';
      im.onload = () => res(im);
      im.onerror = rej;
      im.src = src;
    });
  } catch (e) { console.debug('crossOrigin failed:', e.message); }

  return null;
}

document.querySelectorAll('.book-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.book-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeBook = btn.dataset.book;
    updateChapterTabs();
    applyFilter();
    sidebar.scrollTop = 0;
  });
});

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeChapter = btn.dataset.chapter;
    applyFilter();
    sidebar.scrollTop = 0;
  });
});

searchInput.addEventListener('input', applyFilter);
searchInput.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    searchInput.value = '';
    applyFilter();
  }
});

// Floating toolbar event handlers
const floatTB = document.getElementById('floatToolbar');
floatTB.querySelectorAll('.swatch').forEach(sw => {
  sw.addEventListener('click', () => {
    floatTB.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
    sw.classList.add('active');
    drawState.color = sw.dataset.color;
    if (drawState.tool === 'eraser') {
      setTool('highlighter');
    }
  });
});

function setTool(name) {
  drawState.tool = name;
  document.body.dataset.tool = name;
  floatTB.querySelectorAll('.tool').forEach(t => t.classList.remove('active'));
  const btn = floatTB.querySelector('.tool[data-tool="' + name + '"]');
  if (btn) btn.classList.add('active');
}

floatTB.querySelectorAll('.tool').forEach(btn => {
  btn.addEventListener('click', () => setTool(btn.dataset.tool));
});
document.getElementById('ftSize').addEventListener('change', (e) => {
  drawState.size = parseFloat(e.target.value);
});
const opacityInput = document.getElementById('ftOpacity');
const opacityValLabel = document.getElementById('ftOpVal');
opacityInput.addEventListener('input', (e) => {
  const v = parseInt(e.target.value, 10);
  drawState.opacity = v / 100;
  opacityValLabel.textContent = v + '%';
});
document.getElementById('ftCollapse').addEventListener('click', () => {
  floatTB.classList.toggle('collapsed');
  const btn = document.getElementById('ftCollapse');
  btn.textContent = floatTB.classList.contains('collapsed') ? '▴ 펼치기' : '▾ 접기';
});

// Global keyboard shortcuts: Ctrl+Z = undo, Del = clear page
document.addEventListener('keydown', (e) => {
  const t = e.target;
  if (t && (t.tagName === 'INPUT' || t.tagName === 'SELECT' || t.tagName === 'TEXTAREA' || t.isContentEditable)) return;
  if ((e.ctrlKey || e.metaKey) && (e.key === 'z' || e.key === 'Z' || e.key === 'ㅋ')) {
    e.preventDefault();
    if (activeAnno) activeAnno.doUndo();
    else alert('먼저 페이지에 마우스를 올려놓거나 클릭하여 활성화하세요.');
  } else if (e.key === 'Delete' || e.code === 'Delete' || e.keyCode === 46) {
    e.preventDefault();
    if (activeAnno) activeAnno.doClear(true);
    else alert('먼저 페이지에 마우스를 올려놓거나 클릭하여 활성화하세요.');
  }
});

buildSidebar();
updateChapterTabs();

if (SECTIONS.length > 0) {
  showSection(0);
}
