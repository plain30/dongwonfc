  <script>
const STORE_KEY='dongwonfc_state_v6_inline';
let state, currentUser, currentView='dashboard';
const won=n=>Number(n||0).toLocaleString('ko-KR')+'원';
const $=s=>document.querySelector(s);
const el=(tag,cls='')=>{const e=document.createElement(tag); if(cls)e.className=cls; return e;};
function cloneDefault(){
  if(!window.DEFAULT_DONGWON_DATA || !Array.isArray(window.DEFAULT_DONGWON_DATA.members) || window.DEFAULT_DONGWON_DATA.members.length===0){
    alert('기본 데이터 파일(js/data.js)을 불러오지 못했습니다. GitHub에는 index.html만 올리지 말고 css, js 폴더까지 함께 업로드해야 합니다.');
    return {club:'동원FC',year:2026,admin:{id:'admin',password:'admin2026'},events:[],members:[]};
  }
  return JSON.parse(JSON.stringify(window.DEFAULT_DONGWON_DATA));
}
function validState(obj){return obj && obj.admin && Array.isArray(obj.members) && obj.members.length>0 && Array.isArray(obj.events);}
function loadState(){
  try{
    const saved=localStorage.getItem(STORE_KEY);
    const parsed=saved?JSON.parse(saved):null;
    state=validState(parsed)?parsed:cloneDefault();
  }catch(e){
    state=cloneDefault();
  }
  ensureDefaults();
  if(!validState(state)) state=cloneDefault();
}
function ensureDefaults(){state.members.forEach(m=>{m.id=m.id||m.name;m.password=m.password||'0000';m.admin=!!m.admin;m.role=m.admin?'admin':'member';m.regular=m.regular||{paid:0,unpaid:0,status:'미납'};m.special=m.special||{paid:0,unpaid:0,statuses:[]};m.uniform=m.uniform||{paid:0,unpaid:0};m.total=m.total||{paid:0,unpaid:0,status:''};});}
function save(){localStorage.setItem(STORE_KEY,JSON.stringify(state));}
function findUser(id,pw){id=(id||'').trim();pw=(pw||'').trim(); if(id===state.admin.id&&pw===state.admin.password)return {type:'admin',name:'관리자',id:'admin',admin:true}; const m=state.members.find(x=>x.name===id||x.id===id); if(m&&String(m.password)===pw)return {...m,type:'member',admin:!!m.admin}; return null;}
function isAdmin(){return currentUser&&currentUser.admin;}
function myMember(){if(!currentUser)return null; return state.members.find(m=>m.name===currentUser.name||m.id===currentUser.id);}
function showApp(){ $('#loginPage').classList.add('hidden'); $('#appPage').classList.remove('hidden'); renderMenu(); render();}
function logout(){currentUser=null;sessionStorage.removeItem('dongwon_login');$('#appPage').classList.add('hidden');$('#loginPage').classList.remove('hidden');$('#loginPw').value='';}
function renderMenu(){const menus=isAdmin()?['dashboard','members','fees','special','settings']:['dashboard','my']; const names={dashboard:'대시보드',members:'회원관리',fees:'회비현황',special:'특별회비',settings:'권한/설정',my:'내 정보'}; const menu=$('#menu'); menu.innerHTML=''; menus.forEach(k=>{const b=el('button','navbtn '+(currentView===k?'active':''));b.textContent=names[k];b.onclick=()=>{currentView=k;renderMenu();render();};menu.appendChild(b);}); document.querySelectorAll('.admin-only').forEach(x=>x.classList.toggle('hidden',!isAdmin()));}
function render(){const titles={dashboard:'대시보드',members:'회원관리',fees:'회비현황',special:'특별회비 현황',settings:'권한/설정',my:'내 정보'}; $('#pageTitle').textContent=titles[currentView]||'대시보드'; $('#userInfo').textContent=isAdmin()?`${currentUser.name} 권한으로 로그인 중`:`${currentUser.name}님 본인 정보만 조회 중`; const view=$('#view'); view.innerHTML=''; if(!isAdmin()&&currentView!=='my') currentView='my'; ({dashboard:renderDashboard,members:renderMembers,fees:renderFees,special:renderSpecial,settings:renderSettings,my:renderMy}[currentView]||renderDashboard)(view);}
function stats(list=state.members){const total=list.length; const regPaid=list.filter(m=>m.regular.status==='완납'||m.regular.status==='면제'||Number(m.regular.unpaid||0)===0).length; const specialPaid=list.reduce((a,m)=>a+Number(m.special.paid||0),0); const unpaid=list.reduce((a,m)=>a+Number(m.regular.unpaid||0)+Number(m.special.unpaid||0)+Number(m.uniform.unpaid||0),0); const paid=list.reduce((a,m)=>a+Number(m.total.paid||0),0); return {total,regPaid,specialPaid,unpaid,paid,rate:total?Math.round(regPaid/total*100):0};}
function kpiCards(s){return `<section class="grid cards"><div class="card"><h3>전체 회원</h3><div class="big">${s.total}</div><p class="sub">등록 기준</p></div><div class="card"><h3>정기회비 완료</h3><div class="big">${s.regPaid}</div><p class="sub">납부율 ${s.rate}%</p></div><div class="card"><h3>특별회비 납입</h3><div class="big">${won(s.specialPaid)}</div><p class="sub">전체 합계</p></div><div class="card"><h3>미납 합계</h3><div class="big">${won(s.unpaid)}</div><p class="sub">정기+특별+유니폼</p></div></section>`;}
function badge(status){const t=String(status||''); if(t==='완납'||t==='납부'||t==='면제'||t==='OK')return `<span class="badge ok">${t}</span>`; if(t.includes('미납')||t==='-')return `<span class="badge bad">${t||'미납'}</span>`; if(t.includes('본인'))return `<span class="badge warn">${t}</span>`; return `<span class="badge neutral">${t}</span>`;}
function renderDashboard(view){const list=isAdmin()?state.members:[myMember()].filter(Boolean); const s=stats(list); view.innerHTML=kpiCards(s)+`<section class="split"><div class="card"><h3>회비 납부율</h3><div class="barbox"><div class="barrow"><b>정기회비</b><div class="bar"><span style="width:${s.rate}%"></span></div><b>${s.rate}%</b></div>${eventBars()}</div></div><div class="card"><h3>${isAdmin()?'최근/전체 요약':'나의 요약'}</h3>${summaryTable(list.slice(0,isAdmin()?8:1))}</div></section><div class="notice">이 파일은 정적 HTML 프로그램입니다. 수정한 권한/비밀번호/금액은 현재 브라우저의 localStorage에 저장됩니다.</div>`;}
function eventBars(){return state.events.map(ev=>{const paid=state.members.filter(m=>(m.special.statuses||[]).find(s=>s.eventId===ev.id&&s.status==='납부')).length;const pct=state.members.length?Math.round(paid/state.members.length*100):0;return `<div class="barrow"><span>${ev.title}</span><div class="bar"><span style="width:${pct}%"></span></div><span>${pct}%</span></div>`;}).join('');}
function summaryTable(list){return `<div class="table-wrap"><table><thead><tr><th>성명</th><th>직책</th><th>정기회비</th><th>특별회비</th><th>미납합계</th></tr></thead><tbody>${list.map(m=>`<tr><td>${m.name}</td><td>${m.position||''}</td><td>${badge(m.regular.status)}</td><td class="money">${won(m.special.paid)}</td><td class="money">${won((m.regular.unpaid||0)+(m.special.unpaid||0)+(m.uniform.unpaid||0))}</td></tr>`).join('')}</tbody></table></div>`;}
function memberRows(list, editable=false){return list.map((m,i)=>`<tr><td>${i+1}</td><td>${m.name}</td><td>${m.position||''}</td><td>${m.phone||''}</td><td>${m.admin?badge('관리자'):badge('회원')}</td><td>${badge(m.regular.status)}</td><td class="money">${won(m.regular.paid)}</td><td class="money">${won(m.regular.unpaid)}</td><td class="money">${won(m.special.paid)}</td><td class="money">${won(m.special.unpaid)}</td><td class="money">${won((m.total&&m.total.paid)||0)}</td>${editable?`<td class="actions"><button class="mini" onclick="openMember('${m.id}')">수정</button><button class="mini ghost danger" onclick="deleteMember('${m.id}')">삭제</button></td>`:''}</tr>`).join('');}
function renderMembers(view){view.innerHTML=`<div class="toolbar"><input id="q" placeholder="회원명/직책/연락처 검색"><button onclick="openMember()">회원 추가</button><button class="ghost" onclick="downloadCSV()">CSV 다운로드</button></div><div id="memberTable"></div>`; $('#q').oninput=()=>drawMembers(); drawMembers();}
function drawMembers(){const q=($('#q')?.value||'').trim(); const list=state.members.filter(m=>!q||[m.name,m.position,m.phone].join(' ').includes(q)); $('#memberTable').innerHTML=`<div class="table-wrap"><table><thead><tr><th>No</th><th>성명</th><th>직책</th><th>연락처</th><th>권한</th><th>정기</th><th>정기납입</th><th>정기미납</th><th>특별납입</th><th>특별미납</th><th>총납입</th><th>관리</th></tr></thead><tbody>${memberRows(list,true)}</tbody></table></div>`;}
function renderFees(view){view.innerHTML=`<div class="toolbar"><input id="fq" placeholder="회원 검색"><select id="fs"><option value="">전체</option><option>완납</option><option>미납</option><option>면제</option></select><button class="ghost" onclick="downloadCSV()">CSV 다운로드</button></div><div id="feeTable"></div>`; $('#fq').oninput=$('#fs').onchange=drawFees; drawFees();}
function drawFees(){const q=($('#fq')?.value||'').trim();const fs=$('#fs')?.value||'';let list=state.members.filter(m=>(!q||m.name.includes(q))&&(!fs||m.regular.status===fs)); $('#feeTable').innerHTML=`<div class="table-wrap"><table><thead><tr><th>No</th><th>성명</th><th>직책</th><th>정기상태</th><th>정기납입</th><th>정기미납</th><th>특별납입</th><th>특별미납</th><th>유니폼납입</th><th>유니폼미납</th><th>총상태</th></tr></thead><tbody>${list.map((m,i)=>`<tr><td>${i+1}</td><td>${m.name}</td><td>${m.position||''}</td><td>${badge(m.regular.status)}</td><td class="money">${won(m.regular.paid)}</td><td class="money">${won(m.regular.unpaid)}</td><td class="money">${won(m.special.paid)}</td><td class="money">${won(m.special.unpaid)}</td><td class="money">${won(m.uniform.paid)}</td><td class="money">${won(m.uniform.unpaid)}</td><td>${badge(m.total.status)}</td></tr>`).join('')}</tbody></table></div>`;}
function renderSpecial(view){const rows=state.members.map((m,i)=>`<tr><td>${i+1}</td><td>${m.name}</td><td>${m.position||''}</td>${state.events.map(ev=>`<td>${badge(((m.special.statuses||[]).find(s=>s.eventId===ev.id)||{}).status||'-')}</td>`).join('')}<td class="money">${won(m.special.paid)}</td><td class="money">${won(m.special.unpaid)}</td></tr>`).join('');view.innerHTML=`<div class="table-wrap"><table><thead><tr><th>No</th><th>성명</th><th>직책</th>${state.events.map(ev=>`<th>${ev.title}<br><small>${ev.date||''}</small></th>`).join('')}<th>납입금</th><th>미납금</th></tr></thead><tbody>${rows}</tbody></table></div>`;}
function renderMy(view){const m=myMember(); if(!m){view.textContent='회원정보가 없습니다.';return;} view.innerHTML=kpiCards(stats([m]))+`<section class="card"><h3>내 회원정보</h3><div class="profile"><div><b>성명</b><br>${m.name}</div><div><b>직책</b><br>${m.position||''}</div><div><b>연락처</b><br>${m.phone||''}</div><div><b>배번</b><br>${m.number||''}</div></div></section><section class="card"><h3>내 회비현황</h3>${summaryTable([m])}</section><section class="card"><h3>내 특별회비 상세</h3><div class="table-wrap"><table><thead><tr><th>행사</th><th>일자</th><th>금액</th><th>상태</th></tr></thead><tbody>${state.events.map(ev=>`<tr><td>${ev.title}</td><td>${ev.date||''}</td><td class="money">${won(ev.amount)}</td><td>${badge(((m.special.statuses||[]).find(s=>s.eventId===ev.id)||{}).status||'-')}</td></tr>`).join('')}</tbody></table></div></section>`;}
function renderSettings(view){view.innerHTML=`<section class="card"><h3>관리자 권한 관리</h3><p class="sub">회원의 관리자 권한 부여/해제, 비밀번호 변경은 회원관리의 수정 버튼에서 가능합니다.</p><div class="table-wrap"><table><thead><tr><th>성명</th><th>아이디</th><th>비밀번호</th><th>권한</th><th>관리</th></tr></thead><tbody>${state.members.map(m=>`<tr><td>${m.name}</td><td>${m.id}</td><td>${m.password}</td><td>${m.admin?badge('관리자'):badge('회원')}</td><td><button class="mini" onclick="openMember('${m.id}')">수정</button></td></tr>`).join('')}</tbody></table></div></section>`;}
window.openMember=function(id){let m=id?state.members.find(x=>x.id===id):null; const isNew=!m; m=m||{id:'',name:'',password:'0000',position:'',phone:'',admin:false,regular:{paid:0,unpaid:0,status:'미납'},special:{paid:0,unpaid:0,statuses:state.events.map(e=>({eventId:e.id,status:'-'}))},uniform:{paid:0,unpaid:0},total:{paid:0,unpaid:0,status:'미납'}}; const modal=el('div','modal'); modal.innerHTML=`<div class="modal-card"><h2>${isNew?'회원 추가':'회원 수정'}</h2><div class="form-grid"><label>성명<input id="m_name" value="${m.name}"></label><label>아이디<input id="m_id" value="${m.id||m.name}"></label><label>비밀번호<input id="m_pw" value="${m.password||''}"></label><label>연락처<input id="m_phone" value="${m.phone||''}"></label><label>직책<input id="m_pos" value="${m.position||''}"></label><label>관리자 권한<select id="m_admin"><option value="false">회원</option><option value="true">관리자</option></select></label><label>정기 납입금<input id="m_rp" type="number" value="${m.regular.paid||0}"></label><label>정기 미납금<input id="m_ru" type="number" value="${m.regular.unpaid||0}"></label><label>정기 상태<select id="m_rs"><option>완납</option><option>미납</option><option>면제</option></select></label><label>특별 납입금<input id="m_sp" type="number" value="${m.special.paid||0}"></label><label>특별 미납금<input id="m_su" type="number" value="${m.special.unpaid||0}"></label><label>유니폼 납입금<input id="m_up" type="number" value="${m.uniform.paid||0}"></label><label>유니폼 미납금<input id="m_uu" type="number" value="${m.uniform.unpaid||0}"></label><div class="full"><h3>특별회비 행사별 상태</h3>${state.events.map(ev=>{const st=((m.special.statuses||[]).find(s=>s.eventId===ev.id)||{}).status||'-';return `<label>${ev.title}<select class="evstat" data-eid="${ev.id}"><option>-</option><option>납부</option><option>본인경조사</option><option>면제</option></select></label>`}).join('')}</div></div><div class="toolbar right"><button id="saveMember">저장</button><button class="ghost" id="closeModal">닫기</button></div></div>`; document.body.appendChild(modal); $('#m_admin').value=String(!!m.admin); $('#m_rs').value=m.regular.status||'미납'; document.querySelectorAll('.evstat').forEach(sel=>{const st=((m.special.statuses||[]).find(s=>s.eventId===sel.dataset.eid)||{}).status||'-'; sel.value=st;}); $('#closeModal').onclick=()=>modal.remove(); $('#saveMember').onclick=()=>{const name=$('#m_name').value.trim(); if(!name){alert('성명을 입력해주세요.');return;} const oldIdx=state.members.findIndex(x=>x.id===id); const obj={...m,name,id:$('#m_id').value.trim()||name,password:$('#m_pw').value.trim()||'0000',phone:$('#m_phone').value.trim(),position:$('#m_pos').value.trim(),admin:$('#m_admin').value==='true',role:$('#m_admin').value==='true'?'admin':'member',regular:{paid:+$('#m_rp').value||0,unpaid:+$('#m_ru').value||0,status:$('#m_rs').value},special:{paid:+$('#m_sp').value||0,unpaid:+$('#m_su').value||0,statuses:[...document.querySelectorAll('.evstat')].map(s=>({eventId:s.dataset.eid,status:s.value}))},uniform:{paid:+$('#m_up').value||0,unpaid:+$('#m_uu').value||0},total:{paid:(+$('#m_rp').value||0)+(+$('#m_sp').value||0)+(+$('#m_up').value||0),unpaid:(+$('#m_ru').value||0)+(+$('#m_su').value||0)+(+$('#m_uu').value||0),status:((+$('#m_ru').value||0)+(+$('#m_su').value||0)+(+$('#m_uu').value||0))>0?'미납':'완납'}}; if(oldIdx>=0)state.members[oldIdx]=obj;else state.members.push(obj); save(); modal.remove(); renderMenu(); render();};}
window.deleteMember=function(id){if(!confirm('해당 회원을 삭제하시겠습니까?'))return; state.members=state.members.filter(m=>m.id!==id); save(); render();}
window.downloadCSV=function(){const headers=['성명','직책','연락처','관리자','정기상태','정기납입','정기미납','특별납입','특별미납','총납입','총미납']; const rows=state.members.map(m=>[m.name,m.position,m.phone,m.admin?'Y':'N',m.regular.status,m.regular.paid,m.regular.unpaid,m.special.paid,m.special.unpaid,m.total.paid,m.total.unpaid]); const csv=[headers,...rows].map(r=>r.map(v=>`"${String(v??'').replaceAll('"','""')}"`).join(',')).join('\n'); const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8;'})); a.download='동원FC_회비현황.csv'; a.click(); URL.revokeObjectURL(a.href);}
function init(){loadState(); $('#loginForm').addEventListener('submit',e=>{e.preventDefault(); const user=findUser($('#loginId').value,$('#loginPw').value); if(!user){$('#loginMsg').textContent='아이디 또는 비밀번호가 맞지 않습니다.';return;} currentUser=user; sessionStorage.setItem('dongwon_login',JSON.stringify({id:$('#loginId').value,pw:$('#loginPw').value})); currentView=isAdmin()?'dashboard':'my'; showApp();}); $('#logoutBtn').onclick=logout; $('#darkBtn').onclick=()=>{document.body.classList.toggle('dark'); localStorage.setItem('dongwon_dark',document.body.classList.contains('dark')?'1':'0');}; $('#resetBtn').onclick=()=>{if(confirm('수정된 모든 내용을 초기 데이터로 되돌릴까요?')){localStorage.removeItem(STORE_KEY);loadState();render();}}; if(localStorage.getItem('dongwon_dark')==='1')document.body.classList.add('dark'); const sess=sessionStorage.getItem('dongwon_login'); if(sess){try{const s=JSON.parse(sess); const u=findUser(s.id,s.pw); if(u){currentUser=u;currentView=isAdmin()?'dashboard':'my';showApp();}}catch(e){}}}
document.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
