<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>동원FC 회비관리 시스템 v9.1</title>
<link rel="stylesheet" href="./css/style.css">
<script defer src="./js/defaultData.js"></script>
<script defer src="./js/core.js"></script>
<script defer src="./js/login.js"></script>
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <img class="login-logo" src="./assets/logo.jpg" alt="동원FC 엠블럼">
    <h1>동원FC</h1>
    <h2>2026 회비관리 시스템</h2>
    <div class="login-guide">
      <b>회원 로그인 안내</b><br>
      아이디 : 본인이름<br>
      비밀번호 : 휴대전화번호 뒤 4자리
    </div>
    <label for="loginId">아이디</label>
    <input id="loginId" autocomplete="username" placeholder="예: 홍길동">
    <label for="loginPw">비밀번호</label>
    <input id="loginPw" autocomplete="current-password" type="password" placeholder="휴대전화 뒤 4자리">
    <label class="keep"><input id="keepLogin" type="checkbox"> 로그인 유지</label>
    <button id="loginBtn" class="primary">로그인</button>
    <p id="loginError" class="error"></p>
  </div>
</div>

  <div id="noticePopup" class="notice-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="noticeTitle">
    <div class="notice-popup">
      <div class="notice-head">
        <div>
          <span class="notice-badge">공지사항</span>
          <h3 id="noticeTitle"></h3>
        </div>
        <button type="button" id="noticeCloseX" class="notice-x" aria-label="공지 닫기">×</button>
      </div>
      <div id="noticeBody" class="notice-body"></div>
      <div class="notice-foot">
        <label class="notice-today"><input type="checkbox" id="noticeToday"> 오늘 하루 보지 않기</label>
        <button type="button" id="noticeCloseBtn" class="btn dark">확인</button>
      </div>
    </div>
  </div>

</body>
</html>
