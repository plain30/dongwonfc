<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>동원FC 회비관리 시스템 v8</title>
<link rel="stylesheet" href="./css/style.css">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script defer src="./js/defaultData.js"></script>
<script defer src="./js/app.js"></script>
</head>
<body>
<div id="loginPage" class="login-page">
  <div class="login-card">
    <img class="login-logo" src="./assets/logo.jpg" alt="동원FC 엠블럼">
    <h1>동원FC</h1>
    <h2>2026 회비관리 시스템</h2>
    <div class="login-guide">
      <b>회원 로그인 안내</b><br>
      아이디 : 본인이름<br>
      비밀번호 : 휴대전화번호 뒤 4자리
    </div>
    <label>아이디</label>
    <input id="loginId" autocomplete="username" placeholder="예: 홍길동">
    <label>비밀번호</label>
    <input id="loginPw" autocomplete="current-password" type="password" placeholder="휴대전화 뒤 4자리">
    <label class="keep"><input id="keepLogin" type="checkbox"> 로그인 유지</label>
    <button id="loginBtn" class="primary">로그인</button>
    <p id="loginError" class="error"></p>
  </div>
</div>

<div id="app" class="app hidden">
  <aside class="sidebar">
    <div class="brand"><img src="./assets/logo.jpg"><div><b>동원FC</b><span>회비관리 v8</span></div></div>
    <button data-view="dashboard" class="nav active">대시보드</button>
    <button data-view="members" class="nav admin-only">회원관리</button>
    <button data-view="fees" class="nav admin-only">회비현황</button>
    <button data-view="special" class="nav admin-only">특별회비</button>
    <button data-view="upload" class="nav admin-only">파일 업로드</button>
    <button data-view="backup" class="nav admin-only">백업/복원</button>
    <button data-view="my" class="nav member-only">내 현황</button>
    <button id="logoutBtn" class="nav danger">로그아웃</button>
  </aside>
  <main class="main">
    <header class="topbar">
      <div><h1 id="pageTitle">대시보드</h1><p id="pageSub">회원번호 000은 자동 제외됩니다.</p></div>
      <div class="userbox" id="userBox"></div>
    </header>
    <section id="content"></section>
  </main>
</div>
</body>
</html>
