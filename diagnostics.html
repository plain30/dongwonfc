<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>동원FC V13 연결 진단</title><style>body{font-family:Arial,'Noto Sans KR',sans-serif;background:#f3f6fb;margin:0;color:#0f172a}.wrap{max-width:720px;margin:40px auto;padding:20px}.card{background:#fff;border-radius:20px;padding:26px;box-shadow:0 12px 35px rgba(15,23,42,.1)}button{width:100%;padding:14px;border:0;border-radius:12px;background:#2563eb;color:#fff;font-weight:800;font-size:16px;cursor:pointer}pre{white-space:pre-wrap;word-break:break-all;background:#0f172a;color:#e2e8f0;padding:16px;border-radius:12px;min-height:90px}.ok{color:#15803d}.bad{color:#dc2626}</style></head><body><main class="wrap"><section class="card"><h1>동원FC V13 연결 진단</h1><p>이 페이지는 fetch가 아닌 JSONP 방식으로 Apps Script 연결을 확인합니다.</p><button id="testBtn">공동 서버 연결 확인</button><h3 id="status">대기 중</h3><pre id="result"></pre><p><a href="./index.html?v=131">로그인 화면으로 이동</a></p></section></main><script type="module">import {health} from './js/api.js?v=13.1.0';const status=document.getElementById('status'),result=document.getElementById('result');async function run(){status.className='';status.textContent='확인 중...';result.textContent='';try{const r=await health();status.className='ok';status.textContent='공동 서버 연결 정상';result.textContent=JSON.stringify(r,null,2)}catch(e){status.className='bad';status.textContent='연결 실패';result.textContent=e.stack||e.message||String(e)}}document.getElementById('testBtn').onclick=run;run();</script></body></html>
