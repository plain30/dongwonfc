<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>동원FC 회비납부현황</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main id="loginPage" class="login-wrap">
    <section class="login-card">
      <div class="brand"><span class="logo">DFC</span><div><h1>동원FC</h1><p>2026 회비납부현황 대시보드</p></div></div>
      <form id="loginForm" autocomplete="off">
        <label>아이디<input id="loginId" type="text" placeholder="관리자: admin / 회원: 본인이름" required /></label>
        <label>비밀번호<input id="loginPw" type="password" placeholder="관리자: admin2026 / 회원: 휴대폰 뒤 4자리" required /></label>
        <button type="submit">로그인</button>
        <p id="loginMsg" class="msg"></p>
      </form>
      <div class="hint"><b>관리자</b> admin / admin2026<br><b>회원</b> 본인이름 / 휴대전화번호 뒤 4자리</div>
    </section>
  </main>

  <div id="appPage" class="app hidden">
    <aside class="sidebar">
      <div class="side-brand"><span class="logo small">DFC</span><strong>동원FC</strong></div>
      <nav id="menu"></nav>
      <button id="logoutBtn" class="ghost">로그아웃</button>
    </aside>
    <section class="content">
      <header class="topbar">
        <div><h2 id="pageTitle">대시보드</h2><p id="userInfo"></p></div>
        <div class="top-actions"><button id="darkBtn" class="ghost">다크모드</button><button id="resetBtn" class="danger ghost admin-only">초기화</button></div>
      </header>
      <div id="view"></div>
    </section>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
